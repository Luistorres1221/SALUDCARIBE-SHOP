# ── Server ───────────────────────────────────────────────────────────────────
# Render asigna el puerto via la variable de entorno PORT
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:CAMBIA_ESTE_SECRETO_EN_PRODUCCION_MINIMO_256_BITS_32_CHARS_OK}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ── CORS ──────────────────────────────────────────────────────────────────────
# Produccion: CORS_ORIGINS=https://tu-app.vercel.app
# Multiples origenes: https://a.vercel.app,https://b.vercel.app
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ── Datos (JsonFileStore) ─────────────────────────────────────────────────────
# Docker/Render: DATA_DIR=/app/data
app.data.dir=${DATA_DIR:./data}

# ── Uploads ───────────────────────────────────────────────────────────────────
# Docker/Render: UPLOADS_DIR=/app/uploads
app.uploads.dir=${UPLOADS_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
