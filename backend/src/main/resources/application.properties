# -- Server -------------------------------------------------------------------
server.port=${PORT:8080}

# -- JWT -----------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:CAMBIA_ESTE_SECRETO_EN_PRODUCCION_MINIMO_256_BITS_32_CHARS_OK}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# -- CORS -----------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# -- PostgreSQL ----------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saludcaribe}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# -- Uploads -------------------------------------------------------------------
app.uploads.dir=${UPLOADS_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
